name: teacher_timetable
description: Teacher Timetable App - Manage weekly class schedules with alerts
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.0.5
  flutter_local_notifications: ^17.0.0
  audioplayers: ^5.2.1
  workmanager: ^0.5.2
  intl: ^0.19.0
  share_plus: ^7.2.1
  pdf: ^3.10.4
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
